skills:
- always_loaded: true
  args:
  - -y
  - '@modelcontextprotocol/server-github'
  command: npx
  description: GitHub API 操作：搜索仓库、读取文件、创建 Issue/PR 等
  env:
    GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}
  name: github
- always_loaded: false
  args:
  - -y
  - '@modelcontextprotocol/server-sqlite'
  - ./data.db
  command: npx
  description: 本地 SQLite 数据库连接与 SQL 查询分析
  name: sqlite_analyzer
- always_loaded: false
  args:
  - -y
  - '@modelcontextprotocol/server-filesystem'
  - .
  command: npx
  description: 本地文件系统读写操作
  name: filesystem
- always_loaded: false
  args:
  - -y
  - '@modelcontextprotocol/server-puppeteer'
  command: npx
  description: 无头浏览器自动化：打开网页、抓取动态渲染内容
  name: browser
- always_loaded: false
  args:
  - -y
  - '@modelcontextprotocol/server-vecmath'
  command: npx
  description: ''
  name: vecmath
